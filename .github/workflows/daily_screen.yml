name: Daily Technical Screen

on:
  schedule:
    # Target: email arrives by ~6:30 AM ET
    # GitHub Actions cron delays 30-60 min, run takes ~5 min
    # Schedule at 5:00 AM ET = 09:00 UTC (EDT) / 10:00 UTC (EST)
    - cron: "0 9 * * 1-5"
  workflow_dispatch: # Manual trigger from Actions tab

permissions:
  contents: write # Needed to commit results back to repo

jobs:
  screen:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run screener
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_RECIPIENTS: ${{ secrets.EMAIL_RECIPIENTS }}
          GITHUB_RAW_BASE: https://raw.githubusercontent.com/${{ github.repository }}/main
          DASHBOARD_URL: https://stock-screener-7gb.pages.dev
        run: python -m screener.main

      - name: Commit results
        if: always()
        run: |
          git config user.name  "GitHub Actions"
          git config user.email "actions@github.com"
          git add -f results/latest.json results/charts/ results/history/ || true
          # Only commit if there are staged changes
          git diff --staged --quiet || git commit -m "Screener results: $(date +%Y-%m-%d)"
          git push || true
